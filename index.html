<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Surabhi Raghavan · Portfolio</title>
  <link rel="icon" href="assets/favicon.ico" />
  <link rel="stylesheet" href="css/game.css" />
</head>
<body>

<div id="fade" class="visible"></div>

<!-- HUD -->
<div id="hud-title">✦ SURABHI'S WORLD · Software Engineer Lv.24 ✦</div>

<!-- Controls overlay (centered on load, collapses to corner button) -->
<div id="controls-overlay">
  <div id="controls-modal">
    <div id="controls-modal-title">HOW TO PLAY</div>
    <div id="hud-controls">
      <div class="ctrl-keys"><span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span><span class="ctrl-sep"> or </span><span class="key">↑↓←→</span></div>
      <span class="ctrl-label">Move around</span>
      <div class="ctrl-keys"><span class="key">E</span><span class="ctrl-sep"> / </span><span class="key">Enter ↵</span></div>
      <span class="ctrl-label">Enter building</span>
      <div class="ctrl-keys"><span class="key">Q</span><span class="ctrl-sep"> / </span><span class="key">Esc</span></div>
      <span class="ctrl-label">Exit page</span>
      <div class="ctrl-keys"><span class="key">M</span></div>
      <span class="ctrl-label">Toggle music</span>
    </div>
    <button id="controls-dismiss">Got it! ✦ Let's go</button>
  </div>
</div>

<!-- Collapsed corner button (shown after dismissing) -->
<div id="controls-wrap" hidden>
  <button id="controls-toggle" title="Controls">?</button>
</div>
<div id="location-toast"></div>
<div id="prompt"></div>

<!-- Canvas wrapper — letterboxes to 16:9 on any screen -->
<div id="canvas-wrap">
  <canvas id="game-canvas"></canvas>
  <canvas id="player-canvas"></canvas>
  <div id="labels-container"></div>
</div>
<div id="player-name-tag">Surabhi</div>
<div id="dog-name-tag">Buddy</div>

<!-- Mobile D-Pad -->
<div id="dpad">
  <button id="dpad-up">▲</button>
  <button id="dpad-down">▼</button>
  <button id="dpad-left">◄</button>
  <button id="dpad-right">►</button>
  <button id="dpad-enter">E</button>
</div>

<script src="js/mapRenderer.js?v=12"></script>
<script src="js/game.js?v=14"></script>
<script src="js/music.js"></script>
<script src="js/sfx.js"></script>
<script>
  (function() {
    var overlay  = document.getElementById('controls-overlay');
    var wrap     = document.getElementById('controls-wrap');
    var modal    = document.getElementById('controls-modal');
    var dismiss  = document.getElementById('controls-dismiss');
    var toggle   = document.getElementById('controls-toggle');
    var panel    = document.getElementById('hud-controls');

    function close() {
      overlay.classList.add('dismissed');
      wrap.removeAttribute('hidden');
      localStorage.setItem('ctrl-seen', '1');
    }
    function open() {
      overlay.classList.remove('dismissed');
      wrap.setAttribute('hidden', '');
    }

    // Skip modal if already seen
    if (localStorage.getItem('ctrl-seen')) {
      overlay.classList.add('dismissed');
      wrap.removeAttribute('hidden');
    }

    dismiss.addEventListener('click', function(e) { e.stopPropagation(); close(); });
    toggle.addEventListener('click',  function(e) { e.stopPropagation(); open();  });
    overlay.addEventListener('click', function(e) { if (e.target === overlay) close(); });
    document.addEventListener('keydown', function(e) {
      if (!overlay.classList.contains('dismissed') && (e.key === 'Escape' || e.key === 'Enter')) close();
    });
  })();
</script>
</body>
</html>
